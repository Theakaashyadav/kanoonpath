<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Under Construction</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: radial-gradient(circle at top, #667eea, #764ba2, #000);
  overflow:hidden;
  color:#fff;
}

/* Animated background circles */
body::before, body::after{
  content:'';
  position:absolute;
  width:400px;
  height:400px;
  border-radius:50%;
  background:rgba(255,255,255,0.08);
  animation:move 12s infinite alternate;
}

body::after{
  top:70%;
  left:60%;
  animation-delay:3s;
}

@keyframes move{
  from{ transform:translate(0,0); }
  to{ transform:translate(-100px,-150px); }
}

/* Main Container */
.container{
  position:relative;
  text-align:center;
  padding:60px 40px;
  border-radius:25px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(15px);
  box-shadow:0 0 30px rgba(0,0,0,0.5);
  animation:fadeIn 1.5s ease;
}

/* Entrance animation */
@keyframes fadeIn{
  from{
    opacity:0;
    transform:translateY(40px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

/* Icon */
.icon{
  font-size:70px;
  margin-bottom:15px;
  animation:bounce 2s infinite;
}

@keyframes bounce{
  0%,100%{ transform:translateY(0); }
  50%{ transform:translateY(-12px); }
}

/* Heading */
h1{
  font-size:42px;
  margin-bottom:10px;
  letter-spacing:1px;
}

/* Subtext */
p{
  font-size:17px;
  opacity:0.85;
  margin-bottom:30px;
}

/* Button */
.btn{
  display:inline-block;
  padding:12px 30px;
  border-radius:30px;
  background:linear-gradient(135deg,#00c6ff,#0072ff);
  color:#fff;
  text-decoration:none;
  font-weight:500;
  transition:0.3s;
  box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

.btn:hover{
  transform:translateY(-3px) scale(1.05);
  box-shadow:0 10px 25px rgba(0,0,0,0.5);
}

</style>
</head>

<body>

<div class="container">
  <div class="icon">🚧</div>
  <h1>Website Under Construction</h1>
  <p>We're crafting something awesome for you. Please check back soon!</p>
  <a href="index.html" class="btn">⬅ Go Back</a>
</div>

</body>
</html>
